name: roccoplay
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.11.0


dependencies:
  better_player_plus: ^1.0.8
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  intl: ^0.20.2
  http: ^0.13.6
  image_picker: ^1.0.7
  get_storage: ^2.1.1
  dio: ^5.4.0
  get: ^4.7.3
  speech_to_text: ^7.0.0
  mobile_scanner: ^3.5.2
  volume_controller: ^2.0.7
  screen_brightness: ^0.2.2
  video_player: ^2.8.2
  chewie: ^1.7.4
  share_plus: ^7.2.1
  shared_preferences: ^2.2.2
  country_picker: ^2.0.25
  smooth_page_indicator: ^1.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  firebase_core: ^3.1.1
  firebase_messaging: ^15.0.3
  flutter_local_notifications: ^17.1.2
  razorpay_flutter: ^1.3.5
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/roccoplay_logo.png"
  min_sdk_android: 21

flutter:
  assets:
    - assets/images/
    - assets/videos/


  uses-material-design: true

